name: Build and Deploy Spring Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  ECR_REPO: mhmarbles/spring
  APP_DIR: /home/ubuntu/spring

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup multi-arch
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Configure AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 4. Verify identity
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # 5. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Build and push image
      - name: Build and Push Docker Image
        run: |
          set -e

          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:$IMAGE_TAG

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --no-cache \
            -t $IMAGE_URI \
            --push .

      # 7. Verify image exists
      - name: Verify Image Exists in ECR
        run: |
          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --image-ids imageTag=$IMAGE_TAG \
            --region $AWS_REGION

      # 8. Deploy via SSM
      - name: Deploy to EC2 via SSM
        run: |
          set -e

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Spring Service" \
            --region $AWS_REGION \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "set -ex",
              "echo START_DEPLOY",

              "echo IMAGE_URI='"$IMAGE_URI"'",

              "aws --version",
              "docker --version",

              "echo Login to ECR",
              "aws ecr get-login-password --region '"$AWS_REGION"' | docker login --username AWS --password-stdin '"${{ secrets.AWS_ACCOUNT_ID }}"'.dkr.ecr.'"$AWS_REGION"'.amazonaws.com",

              "cd '"$APP_DIR"' || echo APP_DIR missing",

              "docker-compose down --remove-orphans || true",
              "docker system prune -af || true",

              "sed -i '\''/IMAGE_URI/d'\'' .env || true",
              "echo IMAGE_URI='"$IMAGE_URI"' >> .env",

              "cat .env",

              "docker pull '"$IMAGE_URI"'",

              "docker-compose up -d --force-recreate",

              "docker ps",

              "echo END_DEPLOY"
            ]')

          echo "SSM Command ID: $COMMAND_ID"

          # Wait and track status
          for i in {1..20}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id $COMMAND_ID \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text \
              --region $AWS_REGION)

            echo "Current Status: $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              echo "Deployment successful"
              exit 0

            elif [[ "$STATUS" == "Failed" ]]; then
              echo "Deployment failed. Fetching logs..."

              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --region $AWS_REGION \
                --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
                --output text

              exit 1
            fi

            sleep 15
          done

          echo "Timeout reached. Fetching logs..."

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region $AWS_REGION \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output text

          exit 1
