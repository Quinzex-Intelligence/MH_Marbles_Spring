name: Build and Deploy Spring Service

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-2
  ECR_REPO: mhmarbles/spring
  APP_DIR: /home/ubuntu/spring

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3. Cache Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      # 4. Build JAR
      - name: Build JAR
        run: mvn clean package -DskipTests

      # 5. Setup Docker Buildx
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 7. Login to ECR
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 8. Build & Push Docker Image
      - name: Build and Push Docker Image
        run: |
          set -e

          IMAGE_TAG=${GITHUB_SHA}
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:$IMAGE_TAG

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

          docker buildx build \
            --platform linux/arm64 \
            -t $IMAGE_URI \
            --push .

      # 9. Verify image exists
      - name: Verify Image Exists in ECR
        run: |
          aws ecr describe-images \
            --repository-name ${{ env.ECR_REPO }} \
            --image-ids imageTag=$IMAGE_TAG \
            --region $AWS_REGION

      # 10. Deploy via SSM
      - name: Deploy to EC2 via SSM
        run: |
          set -e

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Spring Service" \
            --region $AWS_REGION \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "set -ex",

              "echo IMAGE_URI='"$IMAGE_URI"'",

              "aws ecr get-login-password --region '"$AWS_REGION"' | docker login --username AWS --password-stdin '"${{ secrets.AWS_ACCOUNT_ID }}"'.dkr.ecr.'"$AWS_REGION"'.amazonaws.com",

              "cd '"$APP_DIR"'",

              "docker-compose down --remove-orphans || true",
              "docker system prune -af || true",

              "sed -i '\''/IMAGE_URI/d'\'' .env || true",
              "echo IMAGE_URI='"$IMAGE_URI"' >> .env",

              "docker pull '"$IMAGE_URI"'",

              "docker-compose up -d --force-recreate",

              "docker ps"
            ]')

          echo "SSM Command ID: $COMMAND_ID"

          for i in {1..20}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id $COMMAND_ID \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text \
              --region $AWS_REGION)

            echo "Current Status: $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              echo "Deployment successful"
              exit 0
            elif [[ "$STATUS" == "Failed" ]]; then
              echo "Deployment failed"

              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --region $AWS_REGION \
                --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
                --output text

              exit 1
            fi

            sleep 15
          done

          echo "Timeout reached. Fetching logs..."

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region $AWS_REGION \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output text

          exit 1
